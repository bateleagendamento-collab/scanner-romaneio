<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Controle de Estoque v4.0</title>
    <div id="dashboard" style="
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:15px;
">

    <div style="background:#0ea5e9;color:white;padding:10px;border-radius:8px;">
        Leituras: <span id="d_leituras">0</span>
    </div>

    <div style="background:#22c55e;color:white;padding:10px;border-radius:8px;">
        Status: <span id="d_status">Online</span>
    </div>

    <div style="background:#f59e0b;color:white;padding:10px;border-radius:8px;">
        Offline: <span id="d_offline">0</span>
    </div>

    <div style="background:#ef4444;color:white;padding:10px;border-radius:8px;">
        Última: <span id="d_ultima">--</span>
    </div>

</div>

    <script src="https://unpkg.com/@zxing/library@latest"></script>

    <style>
        body {
            font-family: Arial;
            margin: 15px;
            text-align: center;
            background: #f5f5f5;
        }

        video {
            width: 100%;
            max-width: 600px;
            border-radius: 10px;
            border: 2px solid #ccc;
            background: black;
        }

        button {
            padding: 12px 18px;
            margin: 5px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        .btn-iniciar { background: #28a745; color: white; }
        .btn-novo { background: #007bff; color: white; }

        #resultado {
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
            color: #198754;
        }

        #contador {
            margin-top: 10px;
            font-size: 18px;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 6px;
            font-size: 14px;
        }

        th { background: #efefef; }

        /* LOGIN */
        #loginBox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
            color: white;
        }

        #loginBox input {
            padding: 10px;
            margin: 5px;
            width: 200px;
        }
    </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
    <h2>Login do Sistema</h2>

    <input id="user" placeholder="Usuário">
    <input id="pass" type="password" placeholder="Senha">

    <button onclick="fazerLogin()" style="padding:10px 20px;background:#22c55e;color:white;border:none;">
        Entrar
    </button>

    <p id="loginErro" style="color:red;"></p>
</div>

<button onclick="logout()" style="
    position:fixed;
    top:10px;
    right:10px;
    background:red;
    color:white;
    padding:8px;
    border:none;
    border-radius:6px;
">
    Sair
</button>

<h2>Controle de Logística</h2>

<div>
    <label><input type="radio" name="operacao" value="Saída" checked> Saída</label>
    <label><input type="radio" name="operacao" value="Devolução"> Devolução</label>
</div>

<br>

<button class="btn-iniciar" onclick="iniciarScanner()">Iniciar Scanner</button>
<button class="btn-novo" onclick="novoScan()">Novo Scan</button>

<br><br>

<video id="video" autoplay playsinline></video>

<div id="resultado"></div>
<div id="status"></div>
<div id="contador">Leituras: 0</div>

<hr>

<h3>Últimas Leituras</h3>

<table>
    <thead>
        <tr>
            <th>Hora</th>
            <th>Operação</th>
            <th>Código</th>
        </tr>
    </thead>
    <tbody id="tbHistorico"></tbody>
</table>

<script>

let scanner;
let codigoLido = false;
let totalLeituras = 0;
let db;

// ================= LOGIN =================
function fazerLogin() {

    const user = document.getElementById("user").value;
    const pass = document.getElementById("pass").value;

    if (user === "admin" && pass === "1234") {

        localStorage.setItem("logado", "true");
        document.getElementById("loginBox").style.display = "none";

    } else {
        document.getElementById("loginErro").innerHTML = "Usuário ou senha inválidos";
    }
}

function verificarLogin() {
    if (localStorage.getItem("logado") === "true") {
        document.getElementById("loginBox").style.display = "none";
    }
}

function logout() {
    localStorage.removeItem("logado");
    location.reload();
}

// ================= INDEXEDDB =================
function abrirBanco() {
    return new Promise((resolve, reject) => {

        const request = indexedDB.open("EstoqueDB", 1);

        request.onupgradeneeded = (event) => {
            db = event.target.result;

            if (!db.objectStoreNames.contains("pendentes")) {
                db.createObjectStore("pendentes", { keyPath: "id" });
            }
        };

        request.onsuccess = (event) => {
            db = event.target.result;
            resolve();
        };

        request.onerror = reject;
    });
}

function salvarOffline(dados) {
    if (!db) return;

    const tx = db.transaction("pendentes", "readwrite");
    tx.objectStore("pendentes").put(dados);
}

function removerPendente(id) {
    if (!db) return;

    const tx = db.transaction("pendentes", "readwrite");
    tx.objectStore("pendentes").delete(id);
}

// ================= ENVIO SERVER =================
async function enviarServidor(dados) {

    try {

        const res = await fetch("https://script.google.com/macros/s/AKfycbwZX9KTf4-Az3CysVSGsYpykKwbCk1CHsBlNgQmgF511_i-UGPPw2ypQXO4rg0tVc2_/exec", {
            method: "POST",
            body: JSON.stringify(dados)
        });

        if (!res.ok) throw new Error();

        await res.text();
        return true;

    } catch (e) {
        return false;
    }
}

// ================= SINCRONIZAÇÃO =================
async function sincronizarPendentes() {

    if (!navigator.onLine || !db) return;

    const tx = db.transaction("pendentes", "readonly");
    const store = tx.objectStore("pendentes");

    const request = store.getAll();

    request.onsuccess = async () => {

        const registros = request.result;

        for (const item of registros) {

            const ok = await enviarServidor(item);

            if (ok) {
                removerPendente(item.id);
            }
        }
    };
}

// ================= BEEP =================
function tocarBip() {

    const audio = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audio.createOscillator();
    const gain = audio.createGain();

    osc.connect(gain);
    gain.connect(audio.destination);

    osc.frequency.value = 1000;

    osc.start();

    gain.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + 0.2);

    osc.stop(audio.currentTime + 0.2);
}

// ================= SCANNER =================
async function iniciarScanner() {

    document.getElementById("status").innerHTML = "Abrindo câmera...";

    const hints = new Map();
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

    scanner = new ZXing.BrowserMultiFormatReader(hints);

    scanner.decodeFromConstraints(
        {
            video: {
                facingMode: { ideal: "environment" }
            }
        },
        "video",
        async (result) => {

            if (result && !codigoLido) {

                codigoLido = true;

                const codigo = result.text;
                const operacao = document.querySelector('input[name="operacao"]:checked').value;

                const agora = new Date();
                const hora = agora.toLocaleTimeString("pt-BR");

                const dados = {
                    id: crypto.randomUUID(),
                    datahora: agora.toLocaleString("pt-BR"),
                    operacao,
                    codigo
                };

                tocarBip();

                document.getElementById("resultado").innerHTML = "Código: " + codigo;
                document.getElementById("status").innerHTML = "Enviando...";

                const ok = await enviarServidor(dados);

                if (ok) {

                    totalLeituras++;

                    document.getElementById("contador").innerHTML =
                        "Leituras: " + totalLeituras;

                    document.getElementById("status").innerHTML =
                        "Salvo com sucesso";

                    adicionarHistorico(hora, operacao, codigo);

                } else {

                    document.getElementById("status").innerHTML =
                        "Offline: salvo localmente";

                    salvarOffline(dados);
                }

                setTimeout(() => {
                    codigoLido = false;
                }, 1500);
            }
        }
    );
}

// ================= HISTÓRICO =================
function adicionarHistorico(hora, operacao, codigo) {

    const tabela = document.getElementById("tbHistorico");
    const linha = tabela.insertRow(0);

    linha.insertCell(0).innerHTML = hora;
    linha.insertCell(1).innerHTML = operacao;
    linha.insertCell(2).innerHTML = codigo;

    while (tabela.rows.length > 20) {
        tabela.deleteRow(tabela.rows.length - 1);
    }
}

// ================= NOVO SCAN =================
function novoScan() {
    codigoLido = false;
    document.getElementById("resultado").innerHTML = "";
    document.getElementById("status").innerHTML = "Pronto para nova leitura";
}

// ================= INIT =================
window.addEventListener("load", async () => {

    verificarLogin();

    await abrirBanco();

    sincronizarPendentes();
    setInterval(sincronizarPendentes, 30000);

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js');
    }

});

</script>

</body>
</html>
