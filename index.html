<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<title>Controle de Estoque v4.0</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
body {
    margin: 0;
    font-family: "Inter", Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #e2e8f0;
    text-align: center;
}

h2 { margin-top: 20px; font-weight: 600; }

#dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    padding: 15px;
    max-width: 900px;
    margin: auto;
}

.card {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 14px;
    padding: 14px;
    font-size: 14px;
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-2px);
    background: rgba(255, 255, 255, 0.12);
}

video {
    width: 95%;
    max-width: 520px;
    border-radius: 16px;
    border: 2px solid rgba(255,255,255,0.1);
    margin-top: 10px;
}

button {
    padding: 12px 16px;
    margin: 6px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 500;
}

.btn-iniciar {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;
}

.btn-novo {
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: white;
}

#resultado {
    margin-top: 15px;
    font-size: 18px;
    font-weight: 600;
    color: #22c55e;
}

#status {
    margin-top: 8px;
    font-size: 14px;
    color: #cbd5e1;
}

table {
    width: 95%;
    margin: auto;
    border-collapse: collapse;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    overflow: hidden;
}

th, td {
    padding: 10px;
    font-size: 13px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

th {
    background: rgba(255,255,255,0.08);
}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
    <h2>Login do Sistema</h2>

    <input id="user" placeholder="Usuário">
    <input id="pass" type="password" placeholder="Senha">

    <button onclick="fazerLogin()" style="background:#22c55e;color:white;padding:10px;border:none;border-radius:6px;">
        Entrar
    </button>

    <p id="loginErro" style="color:red;"></p>
</div>

<button onclick="logout()" style="position:fixed;top:10px;right:10px;background:red;color:white;padding:8px;border:none;border-radius:6px;">
Sair
</button>

<h2>Controle de Logística</h2>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="card">
📦 Leituras<br>
<strong id="d_leituras">0</strong>
</div>

<div class="card">
🟢 Status<br>
<strong id="d_status">Online</strong>
</div>

<div class="card">
📥 Offline<br>
<strong id="d_offline">0</strong>
</div>

<div class="card">
⏱ Última<br>
<strong id="d_ultima">--</strong>
</div>

</div>

<div>
<label><input type="radio" name="operacao" value="Saída" checked> Saída</label>
<label><input type="radio" name="operacao" value="Devolução"> Devolução</label>
</div>

<br>

<button class="btn-iniciar" onclick="iniciarScanner()">Iniciar Scanner</button>
<button class="btn-novo" onclick="novoScan()">Novo Scan</button>

<br><br>

<video id="video" autoplay playsinline></video>

<div id="resultado"></div>
<div id="status"></div>

<hr>

<h3>Últimas Leituras</h3>

<table>
<thead>
<tr>
<th>Hora</th>
<th>Operação</th>
<th>Código</th>
</tr>
</thead>
<tbody id="tbHistorico"></tbody>
</table>

<script>

/* ================= CONFIG ================= */
const URL_API = "https://script.google.com/macros/s/AKfycbwZX9KTf4-Az3CysVSGsYpykKwbCk1CHsBlNgQmgF511_i-UGPPw2ypQXO4rg0tVc2_/exec";

/* ================= VARIÁVEIS ================= */
let scanner;
let codigoLido = false;
let db = null;

let leiturasHoje = 0;
let ultimaLeitura = "--";

/* ================= LOGIN REAL ================= */
function fazerLogin() {

    const user = document.getElementById("user").value.trim();
    const pass = document.getElementById("pass").value.trim();

    fetch(URL_API, {
        method: "POST",
        body: JSON.stringify({
            tipo: "login",
            usuario: user,
            senha: pass
        })
    })
    .then(r => r.json())
    .then(data => {

        if (data.ok) {

            localStorage.setItem("logado", "true");
            localStorage.setItem("usuario", data.nome);

            document.getElementById("loginBox").style.display = "none";

        } else {
            document.getElementById("loginErro").innerText = "Usuário ou senha inválidos";
        }

    })
    .catch(() => {
        document.getElementById("loginErro").innerText = "Erro no servidor";
    });
}

/* ================= LOGOUT ================= */
function logout() {
    localStorage.removeItem("logado");
    localStorage.removeItem("usuario");
    location.reload();
}

/* ================= DB OFFLINE ================= */
function abrirBanco() {

    return new Promise((resolve, reject) => {

        const request = indexedDB.open("EstoqueDB", 1);

        request.onupgradeneeded = (event) => {
            db = event.target.result;

            if (!db.objectStoreNames.contains("pendentes")) {
                db.createObjectStore("pendentes", { keyPath: "id" });
            }
        };

        request.onsuccess = (event) => {
            db = event.target.result;
            resolve();
        };

        request.onerror = reject;
    });
}

function salvarOffline(dados) {

    const lista = JSON.parse(localStorage.getItem("pendentes") || "[]");
    lista.push(dados);
    localStorage.setItem("pendentes", JSON.stringify(lista));
}

/* ================= SYNC ================= */
async function sincronizarPendentes() {

    const lista = JSON.parse(localStorage.getItem("pendentes") || "[]");

    if (lista.length === 0) return;

    for (const item of lista) {
        await fetch(URL_API, {
            method: "POST",
            body: JSON.stringify(item)
        });
    }

    localStorage.removeItem("pendentes");
}

/* ================= DASHBOARD ================= */
function atualizarDashboard() {

    const el1 = document.getElementById("d_leituras");
    const el2 = document.getElementById("d_ultima");
    const el3 = document.getElementById("d_status");

    if (!el1 || !el2 || !el3) return;

    el1.innerText = leiturasHoje;
    el2.innerText = ultimaLeitura;
    el3.innerText = navigator.onLine ? "Online" : "Offline";

    if (!db) return;

    const tx = db.transaction("pendentes", "readonly");
    const store = tx.objectStore("pendentes");
    const req = store.count();

    req.onsuccess = () => {
        document.getElementById("d_offline").innerText = req.result;
    };
}

/* ================= SCANNER ================= */
function iniciarScanner() {

    scanner = new ZXing.BrowserMultiFormatReader();

    scanner.decodeFromConstraints(
        { video: { facingMode: { ideal: "environment" } } },
        "video",
        async (result) => {

            if (result && !codigoLido) {

                codigoLido = true;

                const codigo = result.text;
                const operacao = document.querySelector('input[name="operacao"]:checked').value;
                const usuario = localStorage.getItem("usuario") || "desconhecido";

                const agora = new Date();
                const hora = agora.toLocaleTimeString("pt-BR");

                const dados = {
                    id: crypto.randomUUID(),
                    datahora: agora.toLocaleString("pt-BR"),
                    operacao,
                    codigo,
                    usuario
                };

                const ok = await fetch(URL_API, {
                    method: "POST",
                    body: JSON.stringify(dados)
                })
                .then(r => r.json())
                .then(() => true)
                .catch(() => false);

                if (ok) {

                    leiturasHoje++;
                    ultimaLeitura = hora;
                    adicionarHistorico(hora, operacao, codigo);

                } else {

                    salvarOffline(dados);
                    leiturasHoje++;
                    ultimaLeitura = hora;
                }

                atualizarDashboard();

                setTimeout(() => codigoLido = false, 1500);
            }
        }
    );
}

/* ================= HISTÓRICO ================= */
function adicionarHistorico(hora, operacao, codigo) {

    const tabela = document.getElementById("tbHistorico");
    const linha = tabela.insertRow(0);

    linha.insertCell(0).innerText = hora;
    linha.insertCell(1).innerText = operacao;
    linha.insertCell(2).innerText = codigo;

    while (tabela.rows.length > 20) {
        tabela.deleteRow(tabela.rows.length - 1);
    }
}

/* ================= INIT ================= */
window.addEventListener("load", async () => {

    const user = localStorage.getItem("usuario");

    if (user) {
        document.getElementById("loginBox").style.display = "none";
    }

    await abrirBanco();

    atualizarDashboard();

    setInterval(atualizarDashboard, 5000);
    setInterval(sincronizarPendentes, 30000);

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js');
    }

});

</script>

</body>
</html>
