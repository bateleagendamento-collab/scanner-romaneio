<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Controle de Estoque v4.0</title>

    <script src="https://unpkg.com/@zxing/library@latest"></script>

    <style>
        body {
            font-family: Arial;
            margin: 15px;
            text-align: center;
            background: #f5f5f5;
        }

        video {
            width: 100%;
            max-width: 600px;
            border-radius: 10px;
            border: 2px solid #ccc;
            background: black;
        }

        button {
            padding: 12px 18px;
            margin: 5px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        .btn-iniciar {
            background: #28a745;
            color: white;
        }

        .btn-novo {
            background: #007bff;
            color: white;
        }

        #resultado {
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
            color: #198754;
            word-break: break-all;
        }

        #contador {
            margin-top: 10px;
            font-size: 18px;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 6px;
            font-size: 14px;
        }

        th {
            background: #efefef;
        }
    </style>
</head>

<body>

<h2>Controle de Logística</h2>

<div>
    <label><input type="radio" name="operacao" value="Saída" checked> Saída</label>
    <label><input type="radio" name="operacao" value="Devolução"> Devolução</label>
</div>

<br>

<button class="btn-iniciar" onclick="iniciarScanner()">Iniciar Scanner</button>
<button class="btn-novo" onclick="novoScan()">Novo Scan</button>

<br><br>

<video id="video" autoplay playsinline></video>

<div id="resultado"></div>
<div id="status"></div>
<div id="contador">Leituras: 0</div>

<hr>

<h3>Últimas Leituras</h3>
<table>
    <thead>
        <tr>
            <th>Hora</th>
            <th>Operação</th>
            <th>Código</th>
        </tr>
    </thead>
    <tbody id="tbHistorico"></tbody>
</table>

<script>

let scanner;
let codigoLido = false;
let totalLeituras = 0;
let db;

// ========================
// BANCO OFFLINE (INDEXEDDB)
// ========================
function abrirBanco() {
    return new Promise((resolve, reject) => {

        const request = indexedDB.open("EstoqueDB", 1);

        request.onupgradeneeded = (event) => {
            db = event.target.result;

            if (!db.objectStoreNames.contains("pendentes")) {
                db.createObjectStore("pendentes", { keyPath: "id" });
            }
        };

        request.onsuccess = (event) => {
            db = event.target.result;
            resolve();
        };

        request.onerror = reject;
    });
}

function salvarOffline(dados) {
    const tx = db.transaction("pendentes", "readwrite");
    tx.objectStore("pendentes").add(dados);
}

function removerPendente(id) {
    if (!db) return;
    const tx = db.transaction("pendentes", "readwrite");
    tx.objectStore("pendentes").delete(id);
}

// ========================
// SINCRONIZAÇÃO OFFLINE
// ========================
async function sincronizarPendentes() {

    if (!navigator.onLine || !db) return;

    const tx = db.transaction("pendentes", "readonly");
    const store = tx.objectStore("pendentes");
    const request = store.getAll();

    request.onsuccess = async () => {

        const registros = request.result;

        for (const item of registros) {

            try {
                await fetch("SUA_URL_DO_APPS_SCRIPT", {
                    method: "POST",
                    body: JSON.stringify(item)
                });

                removerPendente(item.id);

            } catch (e) {
                console.log("Falha sync:", e);
            }
        }
    };
}

// ========================
// BEEP
// ========================
function tocarBip() {

    const audio = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audio.createOscillator();
    const gain = audio.createGain();

    osc.connect(gain);
    gain.connect(audio.destination);

    osc.frequency.value = 1000;

    osc.start();

    gain.gain.exponentialRampToValueAtTime(
        0.0001,
        audio.currentTime + 0.2
    );

    osc.stop(audio.currentTime + 0.2);
}

// ========================
// SCANNER
// ========================
async function iniciarScanner() {

    document.getElementById("status").innerHTML = "Abrindo câmera...";

    const hints = new Map();
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

    scanner = new ZXing.BrowserMultiFormatReader(hints);

    scanner.decodeFromConstraints(
        {
            video: {
                facingMode: { ideal: "environment" }
            }
        },
        "video",
        async (result, err) => {

            if (result && !codigoLido) {

                codigoLido = true;

                const codigo = result.text;
                const operacao = document.querySelector('input[name="operacao"]:checked').value;

                const agora = new Date();
                const hora = agora.toLocaleTimeString("pt-BR");

                const dados = {
                    id: crypto.randomUUID(),
                    datahora: agora.toLocaleString("pt-BR"),
                    operacao,
                    codigo
                };

                tocarBip();

                document.getElementById("resultado").innerHTML = "Código: " + codigo;
                document.getElementById("status").innerHTML = "Salvando...";

                fetch("https://script.google.com/macros/s/AKfycbwZX9KTf4-Az3CysVSGsYpykKwbCk1CHsBlNgQmgF511_i-UGPPw2ypQXO4rg0tVc2_/exec", {
                    method: "POST",
                    body: JSON.stringify(dados)
                })
                .then(r => r.text())
                .then(() => {

                    totalLeituras++;

                    document.getElementById("contador").innerHTML =
                        "Leituras: " + totalLeituras;

                    document.getElementById("status").innerHTML =
                        "Salvo com sucesso";

                    adicionarHistorico(hora, operacao, codigo);

                    setTimeout(() => {
                        codigoLido = false;
                    }, 1500);

                })
                .catch(() => {

                    document.getElementById("status").innerHTML =
                        "Offline: salvo localmente";

                    salvarOffline(dados);

                    codigoLido = false;
                });
            }
        }
    );
}

// ========================
// HISTÓRICO
// ========================
function adicionarHistorico(hora, operacao, codigo) {

    const tabela = document.getElementById("tbHistorico");
    const linha = tabela.insertRow(0);

    linha.insertCell(0).innerHTML = hora;
    linha.insertCell(1).innerHTML = operacao;
    linha.insertCell(2).innerHTML = codigo;

    while (tabela.rows.length > 20) {
        tabela.deleteRow(tabela.rows.length - 1);
    }
}

// ========================
// NOVO SCAN
// ========================
function novoScan() {
    codigoLido = false;
    document.getElementById("resultado").innerHTML = "";
    document.getElementById("status").innerHTML = "Pronto para nova leitura";
}

// ========================
// INIT
// ========================
window.addEventListener("load", async () => {

    await abrirBanco();

    sincronizarPendentes();
    setInterval(sincronizarPendentes, 30000);

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js');
    }

});

</script>

</body>
</html>
