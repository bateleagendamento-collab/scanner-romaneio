```
<h2>Scanner de Código de Barras</h2>

<button onclick="iniciarScanner()">
    Iniciar Scanner
</button>

<button onclick="novoScan()">
    Novo Scan
</button>

<br><br>

<video id="video" autoplay playsinline></video>

<div id="resultado"></div>
<div id="status"></div>

<script>

    let scanner;
    let codigoLido = false;

    async function iniciarScanner() {

        document.getElementById("status").innerHTML =
            "Abrindo câmera...";

        scanner = new ZXing.BrowserMultiFormatReader();

        scanner.decodeFromVideoDevice(
            null,
            "video",
            (result, err) => {

                if (result && !codigoLido) {

                    codigoLido = true;

                    const codigo = result.text;

                    document.getElementById("resultado").innerHTML =
                        "Código: " + codigo;

                    document.getElementById("status").innerHTML =
                        "Salvando na planilha...";

                    fetch(
                        "https://script.google.com/macros/s/AKfycbwZX9KTf4-Az3CysVSGsYpykKwbCk1CHsBlNgQmgF511_i-UGPPw2ypQXO4rg0tVc2_/exec",
                        {
                            method: "POST",
                            body: JSON.stringify({
                                codigo: codigo
                            })
                        }
                    )
                    .then(response => response.text())
                    .then(data => {

                        document.getElementById("status").innerHTML =
                            "Código salvo com sucesso!";

                        alert("Código salvo!");

                    })
                    .catch(error => {

                        document.getElementById("status").innerHTML =
                            "Erro ao salvar.";

                        alert("Erro ao salvar: " + error);

                        codigoLido = false;

                    });

                }

            }
        );

    }

    function novoScan() {

        codigoLido = false;

        document.getElementById("resultado").innerHTML = "";

        document.getElementById("status").innerHTML =
            "Pronto para nova leitura.";

    }

</script>
```
