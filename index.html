<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Scanner Estoque</title>

</head>

<body>

<h2>Scanner de Código de Barras</h2>

<button onclick="abrirCamera()">
Abrir Câmera
</button>

<br><br>

<video
id="video"
width="100%"
autoplay
playsinline>
</video>

<p id="status"></p>

<script>

async function abrirCamera() {

    try {

        const stream =
        await navigator.mediaDevices.getUserMedia({

            video: {
                facingMode: "environment"
            }

        });

        document
        .getElementById("video")
        .srcObject = stream;

        document
        .getElementById("status")
        .innerHTML =
        "Câmera aberta com sucesso.";

    }

    catch(err) {

        document
        .getElementById("status")
        .innerHTML =
        err.name + " - " + err.message;

    }

}

</script>

</body>
</html>
