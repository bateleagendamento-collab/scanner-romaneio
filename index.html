<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/@zxing/library@latest"></script>

<title>Scanner Estoque</title>
</head>

<body>

<h2>Scanner de Código de Barras</h2>

<button onclick="iniciarScanner()">
Iniciar Scanner
</button>

<br><br>

<video id="video"
width="100%"
autoplay
playsinline>
</video>

<h3 id="resultado"></h3>

<script>

let scanner;

async function iniciarScanner() {

    scanner =
    new ZXing.BrowserMultiFormatReader();

    scanner.decodeFromVideoDevice(
        null,
        'video',
        (result, err) => {

            if(result){

                document
                .getElementById("resultado")
                .innerHTML =
                "Código: " + result.text;

            }

        }
    );

}

</script>

</body>
</html>
