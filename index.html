<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Estoque</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

/* LOGIN */
#loginBox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

#loginBox input {
    padding: 10px;
    margin: 5px;
    width: 220px;
}

/* DASHBOARD */
#dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px;
    padding: 10px;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 10px;
    border-radius: 10px;
}

/* BOTÕES */
button {
    padding: 10px 14px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.btn-green { background:#22c55e; color:white; }
.btn-blue { background:#3b82f6; color:white; }
.btn-yellow { background:#facc15; color:black; }

/* VIDEO */
video {
    width: 90%;
    max-width: 400px;
    border-radius: 10px;
    margin-top: 10px;
}

#scanStatus {
    font-weight: bold;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
    <h2>Login</h2>
    <input id="user" placeholder="Usuário">
    <input id="pass" type="password" placeholder="Senha">
    <button class="btn-green" onclick="login()">Entrar</button>
    <p id="loginErro"></p>
</div>

<h2>Controle de Estoque</h2>

<!-- DASHBOARD -->
<div id="dashboard">
    <div class="card">📦 Leituras<br><b id="d_leituras">0</b></div>
    <div class="card">🟢 Status<br><b id="d_status">Parado</b></div>
    <div class="card">📥 Offline<br><b id="d_offline">0</b></div>
    <div class="card">⏱ Última<br><b id="d_ultima">--</b></div>
</div>

<!-- OPERAÇÃO -->
<div>
<label><input type="radio" name="op" value="Saída" checked> Saída</label>
<label><input type="radio" name="op" value="Entrada"> Entrada</label>
</div>

<br>

<!-- CONTROLES -->
<button class="btn-green" onclick="toggleScanner()" id="btnScanner">▶ Iniciar</button>
<button class="btn-yellow" onclick="toggleFlash()" id="btnFlash">🔦 Flash OFF</button>

<span id="scanStatus">🔴 Parado</span>

<br>

<video id="video" autoplay playsinline></video>

<div id="resultado"></div>

<hr>

<table border="1" style="width:90%;margin:auto;">
<thead>
<tr>
<th>Hora</th>
<th>Operação</th>
<th>Código</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>

<script>

/* ================= VAR ================= */
let scanner;
let ativo = false;
let travado = false;
let track = null;
let flash = false;
let leituras = 0;

/* ================= LOGIN ================= */
function login() {

    const u = document.getElementById("user").value;
    const p = document.getElementById("pass").value;

    if (u === "admin" && p === "1234") {
        document.getElementById("loginBox").style.display = "none";
    } else {
        document.getElementById("loginErro").innerText = "Login inválido";
    }
}

/* ================= SOM + VIBRA ================= */
function beep() {

    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.frequency.value = 1000;
    osc.start();

    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.15);
    osc.stop(ctx.currentTime + 0.15);

    if (navigator.vibrate) navigator.vibrate(100);
}

/* ================= STATUS ================= */
function setStatus(t, c) {
    const el = document.getElementById("scanStatus");
    el.innerText = t;
    el.style.color = c;
}

/* ================= SCANNER ================= */
function toggleScanner() {

    if (ativo) {
        stopScanner();
    } else {
        startScanner();
    }
}

function startScanner() {

    ativo = true;
    travado = false;

    document.getElementById("btnScanner").innerText = "⏸ Parar";
    setStatus("🟢 Livre", "#22c55e");

    scanner = new ZXing.BrowserMultiFormatReader();

    scanner.decodeFromConstraints(
        { video: { facingMode: "environment" } },
        "video",
        async (result) => {

            if (!ativo) return;

            const video = document.getElementById("video");
            if (video.srcObject && !track) {
                track = video.srcObject.getVideoTracks()[0];
            }

            if (result && !travado) {

                travado = true;

                const codigo = result.text;
                const op = document.querySelector('input[name="op"]:checked').value;
                const hora = new Date().toLocaleTimeString();

                beep();
                setStatus("🟡 Lendo...", "#facc15");

                leituras++;
                document.getElementById("d_leituras").innerText = leituras;
                document.getElementById("d_ultima").innerText = hora;

                addRow(hora, op, codigo);

                setTimeout(() => {
                    travado = false;
                    setStatus("🟢 Livre", "#22c55e");
                }, 1200);
            }
        }
    );
}

function stopScanner() {

    ativo = false;

    try { scanner.reset(); } catch {}

    document.getElementById("btnScanner").innerText = "▶ Iniciar";
    setStatus("🔴 Parado", "red");
}

/* ================= FLASH ================= */
async function toggleFlash() {

    const btn = document.getElementById("btnFlash");

    try {

        const video = document.getElementById("video");

        if (!track && video.srcObject) {
            track = video.srcObject.getVideoTracks()[0];
        }

        flash = !flash;

        await track.applyConstraints({
            advanced: [{ torch: flash }]
        });

        btn.innerText = flash ? "🔦 Flash ON" : "🔦 Flash OFF";

    } catch {
        alert("Flash não suportado neste dispositivo");
    }
}

/* ================= TABELA ================= */
function addRow(h, o, c) {

    const t = document.getElementById("tb");
    const r = t.insertRow(0);

    r.insertCell(0).innerText = h;
    r.insertCell(1).innerText = o;
    r.insertCell(2).innerText = c;

    if (t.rows.length > 15) {
        t.deleteRow(t.rows.length - 1);
    }
}

</script>

</body>
</html>
