</head>

<body>

<h2>Controle de Logistica</h2>

<div>

<label>
<input type="radio"
name="operacao"
value="Saída"
checked>
Saída
</label>

  

<label>
<input type="radio"
name="operacao"
value="Devolução">
Devolução
</label>

</div>

<br>

<button class="btn-iniciar"
onclick="iniciarScanner()">
Iniciar Scanner </button>

<button class="btn-novo"
onclick="novoScan()">
Novo Scan </button>

<br><br>

<video id="video"
autoplay
playsinline> </video>

<div id="resultado"></div>

<div id="status"></div>

<div id="contador">
Leituras: 0
</div>

<div id="historico">

<h3>Últimas Leituras</h3>

<table>

<thead>
<tr>
<th>Hora</th>
<th>Operação</th>
<th>Código</th>
</tr>
</thead>

<tbody id="tbHistorico">

</tbody>

</table>

</div>

<script>

let scanner;
let codigoLido = false;
let totalLeituras = 0;

function tocarBip(){

    const audio =
    new (window.AudioContext ||
    window.webkitAudioContext)();

    const osc =
    audio.createOscillator();

    const gain =
    audio.createGain();

    osc.connect(gain);
    gain.connect(audio.destination);

    osc.frequency.value = 1000;

    osc.start();

    gain.gain.exponentialRampToValueAtTime(
        0.0001,
        audio.currentTime + 0.2
    );

    osc.stop(audio.currentTime + 0.2);

}

async function iniciarScanner(){

    document.getElementById("status").innerHTML =
    "Abrindo câmera...";

    const hints = new Map();

    hints.set(
        ZXing.DecodeHintType.TRY_HARDER,
        true
    );

    scanner =
    new ZXing.BrowserMultiFormatReader(hints);

    scanner.decodeFromConstraints(

        {
            video:{
                facingMode:{
                    ideal:"environment"
                },
                width:{
                    ideal:1920
                },
                height:{
                    ideal:1080
                }
            }
        },

        "video",

        (result, err)=>{

            if(result && !codigoLido){

                codigoLido = true;

                const codigo =
                result.text;

                const operacao =
                document.querySelector(
                    'input[name="operacao"]:checked'
                ).value;

                const agora =
                new Date();

                const hora =
                agora.toLocaleTimeString(
                    "pt-BR"
                );

                tocarBip();

                document.getElementById(
                    "resultado"
                ).innerHTML =
                "Código: " + codigo;

                document.getElementById(
                    "status"
                ).innerHTML =
                "Salvando...";

                fetch(
                    "https://script.google.com/macros/s/AKfycbwZX9KTf4-Az3CysVSGsYpykKwbCk1CHsBlNgQmgF511_i-UGPPw2ypQXO4rg0tVc2_/exec",
                    {
                        method:"POST",
                        body:JSON.stringify({

                            codigo:codigo,
                            operacao:operacao

                        })
                    }
                )
                .then(r => r.text())
                .then(data => {

                    totalLeituras++;

                    document.getElementById(
                        "contador"
                    ).innerHTML =
                    "Leituras: " +
                    totalLeituras;

                    document.getElementById(
                        "status"
                    ).innerHTML =
                    "Salvo com sucesso";

                    adicionarHistorico(
                        hora,
                        operacao,
                        codigo
                    );

                })
                .catch(error => {

                    document.getElementById(
                        "status"
                    ).innerHTML =
                    "Erro ao salvar";

                    codigoLido = false;

                });

            }

        }

    );

}

function adicionarHistorico(
    hora,
    operacao,
    codigo
){

    const tabela =
    document.getElementById(
        "tbHistorico"
    );

    const linha =
    tabela.insertRow(0);

    linha.insertCell(0).innerHTML =
    hora;

    linha.insertCell(1).innerHTML =
    operacao;

    linha.insertCell(2).innerHTML =
    codigo;

    while(tabela.rows.length > 20){

        tabela.deleteRow(
            tabela.rows.length - 1
        );

    }

}

function novoScan(){

    codigoLido = false;

    document.getElementById(
        "resultado"
    ).innerHTML = "";

    document.getElementById(
        "status"
    ).innerHTML =
    "Pronto para nova leitura";

}

</script>

</body>
