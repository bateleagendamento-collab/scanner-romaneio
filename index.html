<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/@zxing/library@latest"></script>

<title>Scanner Estoque v2.0</title>
</head>

<body>

<h2>Scanner de Código de Barras</h2>

<button onclick="iniciarScanner()">
Iniciar Scanner
</button>

<br><br>

<video id="video"
width="100%"
autoplay
playsinline>
</video>

<h3 id="resultado"></h3>

<script>

let scanner;

async function iniciarScanner() {

    scanner =
    new ZXing.BrowserMultiFormatReader();

    scanner.decodeFromVideoDevice(
        null,
        'video',
        (result, err) => {

        if(result && !window.codigoLido){

    window.codigoLido = true;

    document
    .getElementById("resultado")
    .innerHTML =
    "Código: " + result.text;

    fetch(
      "https://script.google.com/macros/s/AKfycbwZX9KTf4-Az3CysVSGsYpykKwbCk1CHsBlNgQmgF511_i-UGPPw2ypQXO4rg0tVc2_/exec",
      {
        method: "POST",
        body: JSON.stringify({
          codigo: result.text
        })
      }
    );

    alert("Código salvo!");

}

}
        }
    );

}

</script>

</body>
</html>
