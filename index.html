<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Pro</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}

#loginBox {
    position:fixed;
    inset:0;
    background:#111827;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

input {
    padding:10px;
    margin:5px;
    width:200px;
}

button {
    padding:10px;
    margin:5px;
    border:none;
    border-radius:6px;
}

video {
    width:90%;
    max-width:500px;
}
</style>

</head>

<body>

<div id="loginBox">
    <h2>Login Seguro</h2>
    <input id="user" placeholder="Usuário">
    <input id="pass" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
    <p id="erro"></p>
</div>

<h3>Usuário: <span id="usuario">--</span></h3>

<button onclick="start()">Iniciar Scanner</button>

<br><br>

<video id="video" autoplay playsinline></video>

<div id="result"></div>

<script>

const URL_API = "SUA_URL_AQUI";

let scanner;
let lock = false;

// ================= LOGIN =================
async function login() {

    const user = document.getElementById("user").value;
    const pass = document.getElementById("pass").value;

    try {

        const res = await fetch(URL_API, {
            method:"POST",
            body: JSON.stringify({
                tipo:"login",
                usuario:user,
                senha:pass
            })
        });

        const data = await res.json();

        if (data.ok) {

            localStorage.setItem("usuario", data.nome);

            document.getElementById("loginBox").style.display = "none";
            document.getElementById("usuario").innerText = data.nome;

        } else {
            document.getElementById("erro").innerText = "Login inválido";
        }

    } catch {
        document.getElementById("erro").innerText = "Erro servidor";
    }
}

// ================= SCANNER =================
function start() {

    scanner = new ZXing.BrowserMultiFormatReader();

    scanner.decodeFromConstraints(
        { video: { facingMode:"environment" } },
        "video",
        async (result) => {

            if (result && !lock) {

                lock = true;

                const codigo = result.text;
                const usuario = localStorage.getItem("usuario");

                document.getElementById("result").innerText = codigo;

                await fetch(URL_API, {
                    method:"POST",
                    body: JSON.stringify({
                        id: crypto.randomUUID(),
                        datahora: new Date().toLocaleString(),
                        operacao:"Saída",
                        codigo,
                        usuario
                    })
                });

                setTimeout(()=> lock=false, 1500);
            }
        }
    );
}

// ================= INIT =================
window.onload = () => {

    const user = localStorage.getItem("usuario");

    if (user) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("usuario").innerText = user;
    }
};

</script>

</body>
</html>
