<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Estoque v4.0</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

/* LOGIN */
#loginBox {
    position: fixed;
    inset: 0;
    background: #0b1220;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

input {
    padding: 10px;
    margin: 5px;
    width: 220px;
    border-radius: 6px;
    border: none;
}

/* BOTÕES */
button {
    padding: 10px 14px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.btn1 { background: #22c55e; color: white; }
.btn2 { background: #3b82f6; color: white; }

/* VIDEO */
video {
    width: 90%;
    max-width: 420px;
    border-radius: 10px;
    margin-top: 10px;
}

#resultado {
    margin-top: 10px;
    font-size: 18px;
    color: #22c55e;
}

#status {
    margin-top: 5px;
    font-size: 14px;
    color: #93c5fd;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
    <h2>Login</h2>
    <input id="user" placeholder="Usuário">
    <input id="pass" type="password" placeholder="Senha">
    <button class="btn1" onclick="login()">Entrar</button>
    <p id="erro"></p>
</div>

<h3>Usuário: <span id="usuario">--</span></h3>

<!-- OPERAÇÃO -->
<div>
<label><input type="radio" name="op" value="Saída" checked> Saída</label>
<label><input type="radio" name="op" value="Entrada"> Entrada</label>
</div>

<br>

<button class="btn1" onclick="startScanner()">Iniciar Scanner</button>
<button class="btn2" onclick="novoScan()">Novo Scan</button>

<br>

<video id="video" autoplay playsinline></video>

<div id="resultado"></div>
<div id="status"></div>

<script>

const URL_API = "https://script.google.com/macros/s/AKfycbwZX9KTf4-Az3CysVSGsYpykKwbCk1CHsBlNgQmgF511_i-UGPPw2ypQXO4rg0tVc2_/exec";

let scanner;
let trava = false;

// ================= LOGIN =================
async function login() {

    try {

        const res = await fetch(URL_API, {
            method: "POST",
            body: JSON.stringify({
                tipo: "login",
                usuario: document.getElementById("user").value.trim(),
                senha: document.getElementById("pass").value.trim()
            })
        });

        const data = await res.json();

        if (data.ok) {

            localStorage.setItem("usuario", data.nome);

            document.getElementById("loginBox").style.display = "none";
            document.getElementById("usuario").innerText = data.nome;

        } else {
            document.getElementById("erro").innerText = "Login inválido";
        }

    } catch {
        document.getElementById("erro").innerText = "Erro servidor";
    }
}

// ================= SCANNER =================
function startScanner() {

    scanner = new ZXing.BrowserMultiFormatReader();

    scanner.decodeFromConstraints(
        { video: { facingMode: "environment" } },
        "video",
        async (result) => {

            if (result && !trava) {

                trava = true;

                const codigo = result.text;
                const usuario = localStorage.getItem("usuario");
                const operacao = document.querySelector('input[name="op"]:checked').value;

                document.getElementById("resultado").innerText = "Código: " + codigo;
                document.getElementById("status").innerText = "Enviando...";

                try {

                    await fetch(URL_API, {
                        method: "POST",
                        body: JSON.stringify({
                            id: crypto.randomUUID(),
                            datahora: new Date().toLocaleString(),
                            operacao,
                            codigo,
                            usuario
                        })
                    });

                    document.getElementById("status").innerText = "Salvo ✔";

                } catch {
                    document.getElementById("status").innerText = "Erro ao enviar";
                }

                setTimeout(() => trava = false, 1500);
            }
        }
    );
}

// ================= RESET =================
function novoScan() {
    trava = false;
    document.getElementById("resultado").innerText = "";
    document.getElementById("status").innerText = "Pronto";
}

// ================= INIT =================
window.onload = () => {

    const user = localStorage.getItem("usuario");

    if (user) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("usuario").innerText = user;
    }
};

</script>

</body>
</html>
